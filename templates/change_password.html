{% extends "base.html" %}
{% block content %}
<section class="panel" style="max-width:560px;margin:30px auto;">
  <h2>Change Password</h2>
  <p class="muted">Update the password for {{ current_user.username }}.</p>
  <form method="post" class="grid">
    <div><label>Current Password</label><input name="current_password" type="password" required></div>
    <div><label>New Password</label><input name="new_password" type="password" required minlength="6"></div>
    <div><label>Confirm New Password</label><input name="confirm_password" type="password" required minlength="6"></div>
    <button type="submit">Change Password</button>
  </form>
</section>
{% endblock %}
